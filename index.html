<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narxlar Panel v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
        }
        .search-input {
            background-color: #1e293b !important;
            border: 2px solid #334155 !important;
            color: #ffffff !important;
        }
        .search-input:focus {
            border-color: #38bdf8 !important;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
        }
        .price-card {
            background: #1e293b;
            border-radius: 20px;
            border-bottom: 4px solid #334155;
            transition: all 0.3s ease;
        }
        .price-card:hover {
            border-bottom-color: #38bdf8;
            transform: translateY(-3px);
        }
        .currency {
            font-size: 0.65em;
            text-transform: lowercase;
            opacity: 0.7;
            margin-left: 2px;
        }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-md mx-auto">
        <div class="text-center mb-10">
            <div class="inline-block p-3 rounded-2xl bg-sky-500/10 mb-4">
                <i class="fa-solid fa-layer-group text-sky-400 text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tight uppercase">Narxlar <span class="text-sky-400">Nazorati</span></h1>
            <p class="text-slate-400 mt-1 text-sm">Model raqami bo'yicha tezkor qidiruv</p>
        </div>

        <div class="relative mb-8">
            <input type="number" id="numSearch" 
                class="search-input w-full p-5 pl-14 rounded-2xl outline-none text-2xl font-bold transition-all"
                placeholder="Modelni yozing...">
            <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-sky-500 text-xl"></i>
        </div>

        <div id="resultBox" class="space-y-5">
            </div>

        <div id="emptyState" class="hidden text-center py-16">
            <div class="text-slate-700 mb-4">
                <i class="fa-solid fa-box-open text-6xl"></i>
            </div>
            <p class="text-slate-500 font-medium">Bunday model topilmadi</p>
        </div>
    </div>

    <script>
        const SHEET_ID = '14FGds9v3H8PUkuGRElFMOzrX6nqiczEFv8a3OcgB7Fo';
        let products = [];

        async function loadData() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                
                products = json.table.rows.map(row => ({
                    model: row.c[0] ? row.c[0].v.toString() : '',
                    optom: row.c[1] ? row.c[1].v : '0',
                    dona: row.c[2] ? row.c[2].v : '0',
                    date: row.c[3] ? new Date(row.c[3].v) : new Date(0),
                    dateStr: row.c[3] ? (row.c[3].f || row.c[3].v) : ''
                }));

                // Eng yangi sana bo'yicha tartiblash
                products.sort((a, b) => b.date - a.date);
            } catch (e) {
                console.error("Xato:", e);
            }
        }

        const input = document.getElementById('numSearch');
        const resultBox = document.getElementById('resultBox');
        const emptyState = document.getElementById('emptyState');

        input.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            resultBox.innerHTML = '';
            
            if (!val) {
                emptyState.classList.add('hidden');
                return;
            }

            const filtered = products.filter(p => p.model === val);

            if (filtered.length > 0) {
                emptyState.classList.add('hidden');
                filtered.forEach(item => {
                    const card = document.createElement('div');
                    card.className = "price-card p-6 shadow-2xl animate-in slide-in-from-bottom-4 duration-300";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-[10px] font-black text-sky-500 uppercase tracking-[2px]">Model</p>
                                <h2 class="text-3xl font-black text-white">${item.model}</h2>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-black text-slate-500 uppercase tracking-[1px]">Yangilandi</p>
                                <p class="text-slate-400 text-xs font-mono">${item.dateStr}</p>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-slate-900/40 p-4 rounded-xl border border-slate-700/50">
                                <p class="text-[10px] text-emerald-500 font-bold uppercase mb-1">📦 Optom</p>
                                <p class="text-xl font-black text-emerald-400">
                                    ${item.optom}<span class="currency text-emerald-500/70 ml-1">so'm</span>
                                </p>
                            </div>
                            <div class="bg-slate-900/40 p-4 rounded-xl border border-slate-700/50">
                                <p class="text-[10px] text-orange-500 font-bold uppercase mb-1">🛍️ Dona</p>
                                <p class="text-xl font-black text-orange-400">
                                    ${item.dona}<span class="currency text-orange-500/70 ml-1">so'm</span>
                                </p>
                            </div>
                        </div>
                    `;
                    resultBox.appendChild(card);
                });
            } else {
                emptyState.classList.remove('hidden');
            }
        });

        loadData();
    </script>

</body>
</html>
